<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>Page</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html {
                font-size: 62.5%;
            }
            body {
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                font-size: 1.6rem;
            }
            .c {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            .pg {
                position: absolute;
                bottom: 5rem;
                width: 100%;
                display: flex;
                justify-content: center;
                gap: .5rem;
            }
            .pg > button {
                display: inline-block;
                width: 20px;
                aspect-ratio: 1;
                /* background: black; */
                border-radius: 50px;
                position: relative;
                overflow: hidden;
                cursor: pointer;
                border: none;
            }
            .pg > * > * {
                position: absolute;
                font-size: 1rem;
                color: white;
                left: 50%;
                padding-top: .5rem;
                top: 0;
                color: black;
                transform:translate3d(-50%, 110%,0);
                transition: transform 650ms ease-out;
                z-index: 99;
            }
            .p {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                /* border: 1px solid; */
            }
            /* .p:first-child{
                z-index: 9;
            } */
            .co {
                position: absolute;
                top: 2rem;
                left: 50%;
                transform: translate3d(-50%, 0, 0);
                width: calc(100% - 1rem);
                height: 80%;
                /* border: 1px solid red; */
            }
            .inf {
                font-size: .8rem;
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .inf > * {
                overflow: hidden;
            }
            .inf > * > * {
                transform: translate3d(0,110%,0);
                pointer-events: all;
            }
            .t {
                position: absolute;
                left: 50%;
                top: 2rem;
                font-size: 1.3rem;
                transform: translate3d(-50%,0,0);
                overflow: hidden;
                z-index: 99;
            }
            .t > * {
                font-weight: 100;
                transform: translate3d(0,110%,0);
            }
            .s {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: white;
                transform: translate3d(0,110%,0);
            }
            .bg {
                background: lightgray;
                opacity: 0;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div class="c">
            <div class="bg"></div>
            <div class="p">
                <div class="co">
                    <div class="inf">
                        <div class="h">
                            <h1>Kamron Bradford</h1>
                        </div>
                        <div class="h">
                            <h3>Kam is 26 years old and works a job.</h3>
                        </div>
                    </div>
                    <div class="inf">
                        <div class="h">
                            <h1>Nerlie Hector</h1>
                        </div>
                        <div class="h">
                            <h3>Ney is 25 years old and works a job.</h3>
                        </div>
                    </div>
                    <div class="inf">
                        <div class="h">
                            <h1>Cam/Nas Bradford</h1>
                        </div>
                        <div class="h">
                            <h3>Cam/Nas is 2 years old and is a baby.</h3>
                        </div>
                    </div>
                </div>
                <div class="s"></div>
            </div>
            <div class="pg">
                <button>
                    <span>1</span>
                </button>
                <button>
                    <span>2</span>
                </button>
                <button>
                    <span>3</span>
                </button>
            </div>
            <div class="t">
                <h4>Nav</h4>
            </div>
        </div>
        <script>
            const { log } = console;

            let s;
            let id;

            function a(t) {
                if (!s) s = t;
                let m = Math.min((t-s)/350,1);
                let e = 1 + (Math.pow(1-m, 2));
                let d = 110 + (0 - 110) * e;

                [...document.querySelectorAll("button > span")].map((u, idx) => {
                    setTimeout(() => {
                        u.style.transform=`translate3d(-50%, ${d}%,0)`
                    }, idx * 150);
                });

                document.querySelector(".t > *").style.transform=`translate3d(0%,${-d}%,0)`
                if (m < 2) {
                    id = requestAnimationFrame(a);
                }
            }

            setTimeout(()=> {
                id = requestAnimationFrame(a);
            }, 500)
            setTimeout(() => {
                cancelAnimationFrame(id);
            }, 1050);





            let s2;
            let sid;
            function sc (t) {
                if(!s2) s2 = t;
                let m = Math.min((t-s2)/500, 1);
                let e = m*(2-m);
                let d = 110 + (0 - 110) * e;

                document.querySelectorAll(".s")[0].style.transform=`translate3d(0,${d}%,0)`

                if (m < 2) {
                    sid = requestAnimationFrame(sc); 
                }
            }



                    // sid = requestAnimationFrame(sc);



            
     



            let pos=0;
            let inf = [...document.querySelectorAll(".inf")];
            let infl = (100 * inf.length) - 100;
            log (infl)
            document.addEventListener("wheel", (e) => {
                let y = (e.deltaY / 120) * 5;
                let threshold = .5;

                pos+=y;
                
                pos = Math.min(Math.max(0, pos), infl);

                document.querySelector(".co").style.transform=`translate3d(-50%, ${-pos}%, 0)`
            });


            let hid;
            let s1;
            function h (t) {
                if (!s1) s1=t;
                let m = Math.min((t-s1)/1000, 1);
                let e = 1 + (Math.pow(1-m, 2));
                let d = 110 + (0 - 110) * e;


                document.querySelectorAll(".inf > * > *").forEach((u,idx) => {
                    // setTimeout(() => {
                        u.style.transform=`translate3d(0,${-d}%,0)`;
                    // }, idx * 50);
                })
                if (m < 2) {
                   hid =  requestAnimationFrame(h);
                } 
            }


            if (hid !== null) {
                hid = requestAnimationFrame(h);

                setTimeout(() => {
                    cancelAnimationFrame(hid);
                }, 1000);
                
            }

            let bid;
            let bs;
            function bg (t){
                if (!bs) bs = t;
                let m = Math.min((t-bs)/1000,1);
                let e = m*(2-m);
                let d = 0 + (1 - 0) * e;

                document.querySelector(".bg").style.opacity=d;

                if (m < 2) {
                    bid=requestAnimationFrame(bg);
                }
            }
            
         
            let pages = ['page1.html', 'page2.html']

            document.querySelectorAll(".pg > button").forEach((u, idx) => {
                u.addEventListener("click", async (e) => {
                    e.preventDefault();
                    sid = requestAnimationFrame(sc);
                    setTimeout(() => { cancelAnimationFrame(sid)},600);
                    s2 = null;


                    if (bid !== null) {
                        bid = requestAnimationFrame(bg);

                        setTimeout(() => {
                            cancelAnimationFrame(bid);
                            document.querySelector(".bg").style.opacity=0;
                        }, 1000);
                    }


                    pos=0;

                 



                    let n = e.target.textContent;
                    let path = `/page.html?p=${n}`;
                    let origin = window.location.origin;

                    let url = new URL(path, origin);




                    window.history.pushState("", "", url);

                    // sid = requestAnimationFrame(sc);
                    // setTimeout(()=>{
                        
                    //     cancelAnimationFrame(sid)
                    //     s2 = null;
                    // },2000); 
                    // s2 = null;

                    let html = await fetch(pages[idx], { method: "GET"});
                    let txt = await html.text();


                    

                    let p = document.createElement("div");
                    p.className = "p";
                    
                    p.innerHTML = txt;

                    
                    

                    setTimeout(() => {
                        document.querySelector(".c").insertAdjacentElement("beforeend", p);

                        setTimeout(() => {
                            document.querySelectorAll(".p")[0].remove();
                        }, 500);
                    }, 500)


                    setTimeout(() => {
                        hid=requestAnimationFrame(h);
                        s1=null;
                    }, 500)
                })
            })

        </script>
    </body>
</html>
