                                    <p>Political prisoner Rev. Joy Powell was notified by law enforcement that she was a target after she began protesting against police brutality and killings of Black people in the city of Rochester.</p>
                                    <p>In 2006, Rev. Joy was convicted of 1st Degree Buglary and Assault- a charge she and many community leaders firmly believe was politically motivated.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

                    <div class="info-fact">
                        <div class="f"><p>The jury was an all-white jury and the only juror of color who recognized Rev. Joy was an activist but was dismissed by the judge.</p></div>
                        <div class="f">
                            <p>Joy was not allowed to mention her activism or her pastoral role.</p>
                        </div>
                        <div class="f">
                            <p>A key defense witness was barred from testifying about their activism and church connection.</p>
                        </div>
                        <div class="f">
                            <p><span class="highlight">Judge Francis Affronti</span>openly stated he would sentence her harshly due to personal bias and sentenced her to 16 years in prison.</p>
                        </div>
                    </div>
                </div>
